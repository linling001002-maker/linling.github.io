pre,textarea{width:100%;min-height:160px;background:#0f172a;color:#e5e7eb;border-radius:10px;padding:12px;overflow:auto;border:none}

<body>

<script>
function hashStrToInt(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
function createRng(seed){const seedInt=seed?hashStrToInt(seed):Math.floor(Math.random()*4294967295);const r=mulberry32(seedInt);return{random:()=>r(),int:(min,max)=>Math.floor(r()*(max-min+1))+min,choice:(arr)=>arr[Math.floor(r()*arr.length)],bool:(p=0.5)=>r()<p}}
const common={streets:["Main","Oak","Pine","Maple","Cedar","Elm","Birch","Walnut","Cherry","Chestnut","Sunset","Riverside","Park","Hill","Lake","View","North","South","East","West"],suffixUS:["St","Ave","Rd","Blvd","Dr","Ln","Way"],streetFR:["Street","Avenue","Boulevard","Lane","Place"],streetDE:["Street","Way","Avenue","Square"],streetUK:["Road","Street","Avenue","Close","Lane","Drive"],streetBR:["Street","Avenue","Lane"],streetCN:["Road","Street","Avenue","Lane","Alley"],streetJP:["Street","Road"],aptUS:["Apt","Unit","Suite"],aptCN:["Building","Unit","Room"]}
function pad(n,len){return String(n).padStart(len,"0")}
function toCSV(rows){if(!rows.length)return"";const header=Object.keys(rows[0]);const esc=v=>String(v).replace(/"/g,'""');const lines=[header.map(h=>`"${h}"`).join(",")];for(const r of rows){lines.push(header.map(h=>`"${esc(r[h]??"")}"`).join(","))}return lines.join("\n")}
function digits(r,n){let s="";for(let i=0;i<n;i++){s+=r.int(0,9)}return s}
function genPhone(code,r){switch(code){case"US":case"CA":{const npa=String(r.int(2,9))+String(r.int(0,9))+String(r.int(0,9));const nxx=String(r.int(2,9))+String(r.int(0,9))+String(r.int(0,9));const line=digits(r,4);return "+1"+npa+nxx+line}case"UK":return "+447"+digits(r,9);case"DE":return "+4915"+digits(r,8);case"FR":return "+336"+digits(r,8);case"JP":return "+8190"+digits(r,8);case"IN":{const first=String(r.choice([6,7,8,9]));return "+91"+first+digits(r,9)}case"AU":return "+614"+digits(r,8);case"BR":{const area=String(r.int(11,99)).padStart(2,"0");return "+55"+area+"9"+digits(r,8)}case"CN":{const lead=String(r.choice([3,4,5,6,7,8,9]));return "+861"+lead+digits(r,9)}default:return "+"+digits(r,11)}}
function genEmail(code,r){const firsts=["alex","sam","li","wei","john","emma","noah","mia","yuki","arjun","lucas","sofia","bruno","anna"];const lasts=["wang","zhang","smith","johnson","brown","taylor","miller","garcia","martin","schneider","dupont","suzuki","patel","silva"];const tldMap={US:"us",UK:"uk",DE:"de",FR:"fr",JP:"jp",IN:"in",CA:"ca",AU:"au",BR:"br",CN:"cn"};const provider=r.choice(["mail","test","example","demo"]);const num=r.int(10,9999);return `${r.choice(firsts)}.${r.choice(lasts)}${num}@${provider}.${tldMap[code]||"com"}`}
function renderTable(rows){if(!rows.length)return"<div class='small'>无数据</div>";const cols=["phone","email","address","country_region","state_province","city","postal_zip_code"];let th="<tr>"+cols.map(c=>`<th>${c}</th>`).join("")+"</tr>";let tb=rows.slice(0,200).map(r=>"<tr>"+cols.map(c=>`<td>${r[c]??""}</td>`).join("")+"</tr>").join("");let more=rows.length>200?`<div class='small'>仅显示前200条，总计 ${rows.length} 条</div>`:"";return `<table class="table">${th}${tb}</table>${more}`}

function getReal(code, r) {
  const list = realAddresses[code];
  const it = r.choice(list);
  const phone = genPhone(code, r);
  const email = genEmail(code, r);
  let addr = "";
  const countryMap = { US: "United States", UK: "United Kingdom", DE: "Germany", FR: "France", JP: "Japan", CN: "China", CA: "Canada", AU: "Australia", BR: "Brazil", IN: "India" };
  const countryName = countryMap[code];

  switch (code) {
    case "US": case "CA": addr = `${it.a}, ${it.c}, ${it.s} ${it.z}, ${countryName}`; break;
    case "UK": addr = `${it.a}, ${it.c} ${it.z}, ${countryName}`; break;
    case "DE": case "FR": addr = `${it.a}, ${it.z} ${it.c}, ${countryName}`; break;
    case "JP": addr = `${it.a}, ${it.c}, ${it.s} ${it.z}, ${countryName}`; break;
    case "CN": addr = `${it.a}, ${it.c}, ${it.s} ${it.z}, ${countryName}`; break;
    case "BR": addr = `${it.a}, ${it.c} - ${it.s}, ${it.z}, ${countryName}`; break;
    case "AU": addr = `${it.a}, ${it.c} ${it.s} ${it.z}, ${countryName}`; break;
    case "IN": addr = `${it.a}, ${it.c}, ${it.s} ${it.z}, ${countryName}`; break;
    default: addr = `${it.a}, ${it.c}, ${it.z}, ${countryName}`;
  }

  return { phone, email, address: addr, country_region: countryName, state_province: it.s, city: it.c, postal_zip_code: it.z };
}

function genUS(r) { return getReal("US", r); }
function genUK(r) { return getReal("UK", r); }
function genDE(r) { return getReal("DE", r); }
function genFR(r) { return getReal("FR", r); }
function genJP(r) { return getReal("JP", r); }
function genIN(r) { return getReal("IN", r); }
function genCA(r) { return getReal("CA", r); }
function genAU(r) { return getReal("AU", r); }
function genBR(r) { return getReal("BR", r); }
function genCN(r) { return getReal("CN", r); }
const generators={US:genUS,UK:genUK,DE:genDE,FR:genFR,JP:genJP,IN:genIN,CA:genCA,AU:genAU,BR:genBR,CN:genCN}
function generate(country,count,seed){const r=createRng(seed);const fn=generators[country];const rows=[];for(let i=0;i<count;i++){rows.push(fn(r))}return rows}
const elCountry=document.getElementById("country")
const elCount=document.getElementById("count")
const elFormat=document.getElementById("format")
const elSeed=document.getElementById("seed")
const elGen=document.getElementById("generate")
const elCopy=document.getElementById("copy")
const elDownload=document.getElementById("download")
const elPreview=document.getElementById("preview")
const elRaw=document.getElementById("raw")
function serialize(rows,fmt){return fmt==="csv"?toCSV(rows):JSON.stringify(rows,null,2)}
function updateUI(rows,fmt){elPreview.innerHTML=renderTable(rows);const txt=serialize(rows,fmt);elRaw.value=txt;elCopy.disabled=txt.length===0;elDownload.disabled=txt.length===0}
elGen.onclick=function(){const country=elCountry.value;const count=Math.max(1,Math.min(10000,parseInt(elCount.value||"1")));const seed=elSeed.value.trim()||undefined;const rows=generate(country,count,seed);updateUI(rows,elFormat.value)}
elFormat.onchange=function(){try{const current=JSON.parse(elRaw.value)}catch{ }
const country=elCountry.value;const count=Math.max(1,Math.min(10000,parseInt(elCount.value||"1")));const seed=elSeed.value.trim()||undefined;const rows=generate(country,count,seed);updateUI(rows,elFormat.value)}
elCopy.onclick=async function(){const text=elRaw.value;if(!text)return;try{await navigator.clipboard.writeText(text)}catch{const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta)}}
elDownload.onclick=function(){const fmt=elFormat.value;const blob=new Blob([elRaw.value],{type:fmt==="csv"?"text/csv;charset=utf-8":"application/json;charset=utf-8"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);const code=elCountry.value;const name=fmt==="csv"?"addresses.csv":"addresses.json";a.download=`${code.toLowerCase()}_${name}`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href)}
updateUI([],elFormat.value)
</script>
